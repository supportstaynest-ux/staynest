<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="StayNest - Find PGs and Rooms Near Your College or Office. Compare prices, amenities, and contact owners directly." />

  <!-- OneSignal Web Push SDK v16 -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <!-- Google Analytics GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BRWDG4B0SC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BRWDG4B0SC', { send_page_views: false });
  </script>

  <title>StayNest – Find Your Perfect PG</title>

  <!-- DNS Prefetch & Preconnect for faster external resource loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="dns-prefetch" href="https://cqrcqaiaarqvenlcukci.supabase.co">

  <!-- Critical: Tailwind CSS (render-blocking, needed for first paint) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Critical: Inter font (primary display font) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!-- Non-critical fonts: Load async to not block render -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet">
  </noscript>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@700&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@700&display=swap" rel="stylesheet">
  </noscript>

  <!-- Material Icons: Load async (not needed for first paint) -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet">
  </noscript>

  <!-- PWA Setup -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- Leaflet Core -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Leaflet Marker Cluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Leaflet Heat -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <!-- Tailwind Config -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#2BB3C0",
            "background-light": "#e8eef4",
            "background-dark": "#0f172a",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>

  <!-- Inline critical styles for instant first paint -->
  <style>
    /* Instant loading skeleton - shows before JS loads */
    #app-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: #e8eef4;
      font-family: 'Inter', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      #app-loader {
        background: #0f172a;
      }

      #app-loader .loader-dot {
        background: #334155;
      }
    }

    .loader-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2BB3C0;
      margin: 0 4px;
      animation: loaderBounce 0.6s ease-in-out infinite alternate;
    }

    .loader-dot:nth-child(2) {
      animation-delay: 0.15s;
    }

    .loader-dot:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes loaderBounce {
      to {
        transform: translateY(-8px);
        opacity: 0.4;
      }
    }

    /* Hide loader once app renders */
    #app:not(:empty)+#app-loader,
    #app:not(:empty)~#app-loader {
      display: none;
    }
  </style>
  
  <link rel="stylesheet" href="/src/mobile-ui.css">
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
  <div id="app"></div>
  <!-- Instant loading indicator (hidden once #app has content) -->
  <div id="app-loader">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
  <div id="toast-container"></div>
  <div id="modal-overlay"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
